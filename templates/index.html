<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Todo List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: #f5f5f5;
        }

        h1 {
            color: #333;
        }

        form {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        input[type="date"] {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        button {
            padding: 8px 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            background-color: #45a049;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: white;
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 6px;
            border: 1px solid #ddd;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        li span {
            flex: 1;
            font-size: 14px;
            color: #333;
        }

        li.done span {
            text-decoration: line-through;
            color: #aaa;
        }

        .due {
            font-size: 12px;
            color: #999;
        }

        a {
            text-decoration: none;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <h1>📝 Todo List</h1>

    <!-- Add Task Form -->
    <form action="/add" method="POST">
        <input type="text" name="title" placeholder="Enter task..." required />
        <input type="date" name="due" />
        <button type="submit">Add</button>
    </form>

    <hr>

    <!-- Task List -->
    <ul>
        {% for todo in todos %}
        <li class="{{ 'done' if todo.done }}">
            <a href="/done/{{ todo.id }}">{{ '✅' if todo.done else '🏃🏼' }}</a>
            <span>
                {{todo.id}} -
                {{ todo.title }}
                {% if todo.due %}
                    <span class="due">· Due: {{ todo.due.strftime('%d/%m/%Y') }}</span>
                {% endif %}
            </span>
            <a href="/delete/{{ todo.id }}">🗑️</a>
        </li>
        {% else %}
            <p style="color: #aaa;">No tasks yet. Add one above!</p>
        {% endfor %}
    </ul>

</body>
</html>
